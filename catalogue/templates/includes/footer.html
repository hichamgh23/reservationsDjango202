<footer class="footer-premium mt-5">
    <div class="footer-glow"></div> <div class="container py-4 text-center">
        <div class="footer-content" style="opacity: 0; transform: translateY(20px);">
            <div class="mb-2 font-weight-bold text-white">
                &copy; <span id="year"></span> Projet Réservations ICC / EPFC 
            </div>
            <div class="footer-links">
                <a href="#" class="footer-link mx-2">Conditions d'utilisation</a>
                <span class="text-secondary">|</span>
                <a href="#" class="footer-link mx-2">Contact</a>
            </div>
            <div class="mt-3">
                <i class="fas fa-university text-secondary"></i> 
                <span class="small text-muted ml-2 text-uppercase tracking-wider">PickShow System</span>
            </div>
        </div>
    </div>
</footer>

<style>
    .footer-premium {
        position: relative;
        background: #0a0a0a; /* Noir profond */
        overflow: hidden;
        border-top: 1px solid #222;
    }

    /* La ligne de lumière qui traverse le haut du footer */
    .footer-glow {
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, transparent, #e74c3c, transparent);
        animation: scan 4s linear infinite;
    }

    @keyframes scan {
        0% { left: -100%; }
        100% { left: 100%; }
    }

    .footer-link {
        color: #888;
        text-decoration: none;
        font-size: 0.9rem;
        transition: 0.3s;
    }

    .footer-link:hover {
        color: #e74c3c;
        text-shadow: 0 0 8px rgba(231, 76, 60, 0.4);
    }

    .tracking-wider { letter-spacing: 2px; }
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // 1. Mise à jour automatique de l'année
    document.getElementById('year').textContent = new Date().getFullYear();

    // 2. Animation d'apparition au défilement (Scroll Reveal)
    const footerContent = document.querySelector('.footer-content');
    
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                footerContent.style.transition = "all 0.8s ease-out";
                footerContent.style.opacity = "1";
                footerContent.style.transform = "translateY(0)";
            }
        });
    }, { threshold: 0.1 });

    observer.observe(footerContent);
});
</script>
