<!-- =========================================================
     footer.html — Pied de page premium
     Styles : footer.css | Scripts : footer.js (chargés depuis base.html)
     ========================================================= -->
<footer class="footer-premium mt-5">

    <!-- Trait rouge animé (effet scan laser) -->
    <div class="laser-scanner">
        <div class="laser-beam"></div>
    </div>

    <div class="container py-5">
        <div class="footer-inner text-center">

            <!-- Identité du projet -->
            <div class="footer-brand mb-4">
                <h3 class="brand-name">
                    Projet<span class="text-danger">Réservations</span>
                </h3>
                <div class="brand-line"></div>
            </div>

            <!-- Navigation (flux RSS) -->
            <div class="footer-nav mb-4">
                <a href="{% url 'catalogue:feed_representations' %}" class="f-link" target="_blank">
                    <i class="fas fa-rss"></i> RSS
                </a>
                <span class="f-sep"> | </span>
            </div>

            <!-- Copyright + statut système -->
            <div class="footer-info">
                <div class="mb-2 font-weight-bold text-white">
                    &copy; <span id="year"></span> Projet Réservations ICC / EPFC
                </div>
                <div class="system-status">
                    <i class="fas fa-microchip mr-2"></i>
                    <span class="small text-muted text-uppercase tracking-widest">System Status: </span>
                    <span class="status-pulse">ONLINE</span>
                </div>
            </div>

        </div>
    </div>
</footer>
