{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="utick-detail-page">
    <div class="container">
        <div class="utick-main-wrapper">
            <div class="row no-gutters">
                
                <div class="col-md-5">
                    <div class="utick-visual-side">
                        <img src="{{ show.poster_url }}" alt="{{ show.title }}">
                    </div>
                </div>

                <div class="col-md-7">
                    <div class="utick-content-side">
                        <div class="utick-breadcrumb">
                            <a href="{% url 'catalogue:show_index' %}">CATALOGUE</a> / {{ show.title|upper }}
                        </div>

                        <h1 class="utick-title">{{ show.title|upper }}</h1>
                        <div class="utick-location-label">
                            <i class="fas fa-map-marker-alt"></i> {{ show.location.designation|upper }}
                        </div>

                        <div class="utick-description-box">
                            <p>{{ show.description|linebreaks }}</p>
                        </div>

                        <div class="utick-booking-card">
                            <div class="booking-header">RÉSERVER VOS PLACES</div>
                            
                            <form action="{% url 'catalogue:book_representation' 0 %}" method="POST" id="utickBookingForm">
                                {% csrf_token %}
                                
                                <div class="booking-inner">
                                    <div class="form-group">
                                        <label class="small font-weight-bold">CHOISISSEZ UNE SÉANCE</label>
                                        <select id="repSelect" class="form-control utick-input" required>
                                            <option value="" disabled selected>-- Sélectionner une date --</option>
                                            {% for rep in representations %}
                                                <option value="{{ rep.id }}">
                                                    {{ rep.when|date:"d F Y à H:i" }}
                                                </option>
                                            {% endfor %}
                                        </select>
                                    </div>

                                    <div class="form-group">
                                        <label class="small font-weight-bold">NOMBRE DE PERSONNES</label>
                                        <div class="input-group">
                                            <input type="number" name="places" class="form-control utick-input" value="1" min="1" max="10">
                                            <div class="input-group-append">
                                                <span class="input-group-text bg-white border-left-0">{{ show.price }} € / pers.</span>
                                            </div>
                                        </div>
                                    </div>

                                    <button type="submit" class="btn utick-btn-buy">
                                        AJOUTER AU PANIER
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<style>
    /* RESET ET FOND NOIR */
    .utick-detail-page { background-color: #050505; min-height: 100vh; padding: 120px 0 60px; font-family: 'Montserrat', sans-serif; }
    .utick-main-wrapper { background: #fff; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
    .utick-visual-side img { width: 100%; height: 100%; object-fit: cover; min-height: 600px; }
    .utick-content-side { padding: 60px; color: #111; }
    .utick-title { font-size: 3rem; font-weight: 900; line-height: 1; margin-bottom: 10px; }
    .utick-location-label { font-weight: 700; color: #e74c3c; margin-bottom: 30px; }
    .utick-booking-card { border: 1px solid #eee; background: #fcfcfc; }
    .booking-header { background: #111; color: #fff; padding: 15px 25px; font-weight: 800; font-size: 0.8rem; letter-spacing: 2px; }
    .booking-inner { padding: 30px; }
    .utick-input { border-radius: 0; height: 50px; border: 1px solid #ddd; font-weight: 600; }
    .utick-btn-buy { background: #e74c3c; color: #fff; width: 100%; padding: 18px; font-weight: 900; border-radius: 0; transition: 0.3s; }
    .utick-btn-buy:hover { background: #000; }
</style>

<script>
document.getElementById('utickBookingForm').addEventListener('submit', function(e) {
    const select = document.getElementById('repSelect');
    const repId = select.value;
    
    if (!repId) {
        e.preventDefault();
        alert('Veuillez sélectionner une séance.');
        return;
    }

    // On récupère l'URL avec l'ID '0' et on remplace par le vrai ID
    let actionUrl = this.getAttribute('action');
    this.action = actionUrl.replace('/0/', '/' + repId + '/');
});
</script>
{% endblock %}
