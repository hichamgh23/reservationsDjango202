{% extends 'catalogue/base.html' %}

{% block content %}
<div class="theater-viewport">
    <div class="stage-background"></div>

    <div class="curtain-container">
        <div class="curtain left-curtain"></div>
        <div class="curtain right-curtain"></div>
    </div>

    <div class="reveal-content">
        <h1 class="main-title">PROJET</h1>
        <h1 class="main-title text-danger">RÉSERVATIONS</h1>
        <p class="hero-lead">LE SPECTACLE COMMENCE ICI</p>
        <a href="{% url 'catalogue:show_index' %}" class="btn-theatre mt-4">
            PRENDRE PLACE <i class="fas fa-mask ml-2"></i>
        </a>
    </div>
</div>

<style>
    /* 1. FORCE LE NOIR DERRIÈRE LE BLOC POUR ÉVITER LES FUITES */
    :host, :root {
        background-color: #000 !important;
    }

    /* 2. LE CONTENEUR PRINCIPAL (THÉÂTRE) */
    .theater-viewport {
        position: relative;
        /* On s'étire vers la gauche (-15px) pour coller au menu */
        /* On s'étire vers le bas pour coller/recouvrir le footer */
        margin-left: -15px; 
        margin-right: -15px;
        margin-bottom: -100px; /* On pousse fort vers le bas */
        padding-bottom: 100px; /* On compense pour garder le contenu centré */
        
        width: calc(100% + 30px); 
        height: 100vh; /* On prend toute la hauteur possible */
        
        background: #000;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1;
    }

    .stage-background {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at center, #1a1a1a 0%, #000 85%);
        z-index: 1;
    }

    /* 3. LES RIDEAUX (COLLÉS ET SANS TRAIT BLANC AU MILIEU) */
    .curtain-container {
        position: absolute;
        inset: 0;
        display: flex;
        z-index: 10;
        pointer-events: none;
    }

    .curtain {
        width: 50.5%; /* Chevauchement pour bloquer le blanc au centre */
        height: 100%;
        background: url('https://i.imgur.com/Yh380S7.jpg') center/cover no-repeat;
        box-shadow: inset 0 0 100px #000;
        transition: transform 2.5s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: transform;
    }

    /* ANIMATION D'OUVERTURE */
    .theater-viewport.opened .left-curtain { 
        transform: translateX(-100%); 
    }
    .theater-viewport.opened .right-curtain { 
        transform: translateX(100%); 
    }

    /* 4. LE CONTENU (TEXTE ET BOUTON) */
    .reveal-content {
        position: relative;
        z-index: 5;
        text-align: center;
        opacity: 0;
        transform: scale(0.9);
        transition: all 1.5s ease 1.2s; /* Attend que les rideaux s'ouvrent un peu */
    }

    .theater-viewport.opened .reveal-content { 
        opacity: 1; 
        transform: scale(1); 
    }

    .main-title { 
        font-size: 5.5rem; 
        font-weight: 900; 
        color: white; 
        margin: 0; 
        line-height: 0.9;
        text-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    .text-danger { 
        color: #e74c3c !important; 
    }

    .hero-lead { 
        color: #888; 
        letter-spacing: 12px; 
        text-transform: uppercase; 
        margin-top: 25px; 
        font-weight: bold;
    }
    
    .btn-theatre {
        display: inline-block;
        padding: 18px 50px;
        border: 2px solid #e74c3c;
        border-radius: 50px;
        color: white;
        text-decoration: none !important;
        background: rgba(231, 76, 60, 0.1);
        font-weight: bold;
        transition: 0.4s;
        margin-top: 30px;
    }

    .btn-theatre:hover {
        background: #e74c3c;
        box-shadow: 0 0 30px rgba(231, 76, 60, 0.5);
        transform: translateY(-3px);
    }

    /* 5. FIX FINAL POUR LE FOOTER (JUSTE POUR CETTE PAGE) */
    footer {
        position: relative;
        z-index: 2;
        background-color: #000 !important;
        border-top: none !important;
        margin-top: 0 !important;
    }
</style>
<script>
    // On ajoute la classe 'opened' après 500ms pour lancer l'animation CSS
    window.addEventListener('load', function() {
        setTimeout(function() {
            document.querySelector('.theater-viewport').classList.add('opened');
        }, 500);
    });
</script>
{% endblock %}
