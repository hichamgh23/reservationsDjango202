{% extends 'catalogue/base.html' %}

{% block title %}Supprimer {{ artist.firstname }} {{ artist.lastname }}{% endblock %}

{% block content %}
<div class="catalogue-page">
    <div class="container">
        <div class="bg-white border rounded p-5 text-center" style="max-width:480px;margin:60px auto;">
            <i class="fas fa-trash fa-3x text-danger mb-3"></i>
            <h4>Êtes-vous sûr de vouloir supprimer</h4>
            <h3 class="text-danger">{{ artist.firstname }} {{ artist.lastname }} ?</h3>
            <p class="text-muted">Cette action est irréversible.</p>
            <form method="post" class="mt-4">
                {% csrf_token %}
                <input type="hidden" name="_method" value="DELETE">
                <a href="{% url 'catalogue:artist_index' %}" class="btn btn-secondary mr-2">Annuler</a>
                <button type="submit" class="btn btn-danger">Supprimer</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
